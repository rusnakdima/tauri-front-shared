name: Publish Packages

on:
  push:
    tags:
      - "core@v*"
      - "core-api@v*"
      - "core-crud@v*"
      - "core-i18n@v*"
      - "core-logger@v*"
      - "core-storage@v*"
      - "data@v*"
      - "feedback@v*"
      - "grid@v*"
      - "layout@v*"
      - "storage@v*"
      - "ui@v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@tauri-front"

      - name: Install dependencies
        run: npm install

      - name: Publish core
        if: startsWith(github.ref, 'refs/tags/core@')
        run: |
          cd projects/core && npm run build && npm publish . --access public --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish core-api
        if: startsWith(github.ref, 'refs/tags/core-api@')
        run: |
          cd projects/core-api && npm run build && npm publish . --access public --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish core-crud
        if: startsWith(github.ref, 'refs/tags/core-crud@')
        run: |
          cd projects/core-crud && npm run build && npm publish . --access public --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish core-i18n
        if: startsWith(github.ref, 'refs/tags/core-i18n@')
        run: |
          cd projects/core-i18n && npm run build && npm publish . --access public --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish core-logger
        if: startsWith(github.ref, 'refs/tags/core-logger@')
        run: |
          cd projects/core-logger && npm run build && npm publish . --access public --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish core-storage
        if: startsWith(github.ref, 'refs/tags/core-storage@')
        run: |
          cd projects/core-storage && npm run build && npm publish . --access public --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish data
        if: startsWith(github.ref, 'refs/tags/data@')
        run: |
          cd projects/data && npm run build && npm publish . --access public --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish feedback
        if: startsWith(github.ref, 'refs/tags/feedback@')
        run: |
          cd projects/feedback && npm run build && npm publish . --access public --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish grid
        if: startsWith(github.ref, 'refs/tags/grid@')
        run: |
          cd projects/grid && npm run build && npm publish . --access public --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish layout
        if: startsWith(github.ref, 'refs/tags/layout@')
        run: |
          cd projects/layout && npm run build && npm publish . --access public --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish storage
        if: startsWith(github.ref, 'refs/tags/storage@')
        run: |
          cd projects/storage && npm run build && npm publish . --access public --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish ui
        if: startsWith(github.ref, 'refs/tags/ui@')
        run: |
          cd projects/ui && npm run build && npm publish . --access public --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
