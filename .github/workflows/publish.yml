name: Publish Packages

on:
  push:
    tags:
      - "core@v*"
      - "core-api@v*"
      - "core-crud@v*"
      - "core-i18n@v*"
      - "core-logger@v*"
      - "core-storage@v*"
      - "data@v*"
      - "feedback@v*"
      - "grid@v*"
      - "layout@v*"
      - "storage@v*"
      - "ui@v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@tauri-front"

      - run: npm ci

      - name: Publish core
        if: startsWith(github.ref, 'refs/tags/core@')
        run: npm publish projects/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish core-api
        if: startsWith(github.ref, 'refs/tags/core-api@')
        run: npm publish projects/core-api
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish core-crud
        if: startsWith(github.ref, 'refs/tags/core-crud@')
        run: npm publish projects/core-crud
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish core-i18n
        if: startsWith(github.ref, 'refs/tags/core-i18n@')
        run: npm publish projects/core-i18n
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish core-logger
        if: startsWith(github.ref, 'refs/tags/core-logger@')
        run: npm publish projects/core-logger
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish core-storage
        if: startsWith(github.ref, 'refs/tags/core-storage@')
        run: npm publish projects/core-storage
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish data
        if: startsWith(github.ref, 'refs/tags/data@')
        run: npm publish projects/data
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish feedback
        if: startsWith(github.ref, 'refs/tags/feedback@')
        run: npm publish projects/feedback
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish grid
        if: startsWith(github.ref, 'refs/tags/grid@')
        run: npm publish projects/grid
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish layout
        if: startsWith(github.ref, 'refs/tags/layout@')
        run: npm publish projects/layout
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish storage
        if: startsWith(github.ref, 'refs/tags/storage@')
        run: npm publish projects/storage
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish ui
        if: startsWith(github.ref, 'refs/tags/ui@')
        run: npm publish projects/ui
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
