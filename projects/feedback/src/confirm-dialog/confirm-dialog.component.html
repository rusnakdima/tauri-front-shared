<app-dialog
  [show]="isOpen()"
  [title]="title"
  size="sm"
  [showHeader]="true"
  [backdropClose]="false"
  [showClose]="false"
  (closed)="onCancel()"
>
  <div class="confirm-body">
    @if (message) {
      <p class="confirm-message">{{ message }}</p>
    }
  </div>
  <div class="confirm-footer">
    <button
      type="button"
      class="confirm-btn confirm-btn-cancel"
      (click)="onCancel()"
    >
      {{ cancelText }}
    </button>
    <button
      type="button"
      class="confirm-btn"
      [class.confirm-btn-primary]="confirmVariant === 'primary'"
      [class.confirm-btn-danger]="confirmVariant === 'danger'"
      (click)="onConfirm()"
    >
      {{ confirmText }}
    </button>
  </div>
</app-dialog>
