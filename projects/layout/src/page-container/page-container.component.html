<div
  class="app-page-container"
  [class.app-page-container-padding]="responsivePadding"
>
  @if (title || subtitle) {
    <div class="app-page-container-header">
      @if (title) {
        <h1 class="app-page-container-title">{{ title }}</h1>
      }
      @if (subtitle) {
        <p class="app-page-container-subtitle">{{ subtitle }}</p>
      }
    </div>
  }
  <div class="app-page-container-content">
    <ng-content></ng-content>
  </div>
</div>
