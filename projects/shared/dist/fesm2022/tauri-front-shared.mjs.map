@if (open) {
  <div
    class="ui-snackbar ui-snackbar-{{ type }}"
    [style.border-left-color]="'var(--' + type + '-color, var(--accent))'"
    role="status"
  >
    <span class="ui-snackbar-message">{{ message }}</span>
    @if (action) {
      <button
        class="ui-snackbar-action"
        (click)="handleAction()"
      >
        {{ action }}
      </button>
    }
    <button
      class="ui-snackbar-close"
      (click)="dismiss()"
      aria-label="Dismiss"
    >
      &times;
    </button>
  </div>
}
