@if (open) {
  <div
    class="ui-modal-overlay"
    (click)="handleOverlayClick($event)"
  >
    <div class="ui-dialog ui-dialog-{{ size }}">
      <header class="ui-dialog-header">
        <h2>{{ title }}</h2>
        <button
          class="ui-dialog-close"
          (click)="close()"
          aria-label="Close"
        >
          &times;
        </button>
      </header>
      <div class="ui-dialog-body">
        <ng-content></ng-content>
      </div>
    </div>
  </div>
}
