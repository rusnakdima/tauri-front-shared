<div class="ui-designer-tree">
  <div class="ui-designer-tree-header">Layers</div>
  <div class="ui-designer-tree-body">
    @for (node of treeNodes(); track node.id) {
      <app-designer-tree-node
        [node]="node"
        [depth]="0"
        (select)="selectNode($event)"
      ></app-designer-tree-node>
    }
    @if (treeNodes().length === 0) {
      <div class="ui-designer-tree-empty">No elements</div>
    }
  </div>
</div>
