<label
  class="ui-switch"
  [class.ui-switch-checked]="checked"
>
  <input
    type="checkbox"
    [checked]="checked"
    [disabled]="disabled"
    (change)="handleChange($event)"
    class="ui-switch-input"
  />
  <span class="ui-switch-slider"></span>
  @if (label) {
    <span class="ui-switch-label">{{ label }}</span>
  }
</label>
