<table class="ui-table">
  <thead>
    <tr>
      @for (col of parsedColumns; track col.key) {
        <th>{{ col.name }}</th>
      }
    </tr>
  </thead>
  <tbody>
    @for (row of parsedData; track row) {
      <tr>
        @for (col of parsedColumns; track col.key) {
          <td>{{ row[col.key] }}</td>
        }
      </tr>
    }
  </tbody>
</table>
