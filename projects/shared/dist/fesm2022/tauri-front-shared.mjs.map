<div class="ui-canvas-toolbar">
  <div class="ui-toolbar-group">
    <button
      class="ui-icon-btn"
      [disabled]="!canUndo"
      (click)="emit('undo')"
      title="Undo"
    >
      <span>↩</span>
    </button>
    <button
      class="ui-icon-btn"
      [disabled]="!canRedo"
      (click)="emit('redo')"
      title="Redo"
    >
      <span>↪</span>
    </button>
  </div>
  <div class="ui-toolbar-group">
    <button class="ui-icon-btn" (click)="emit('zoom-out')" title="Zoom Out">
      <span>−</span>
    </button>
    <span class="ui-zoom-label">{{ zoomLevel }}%</span>
    <button class="ui-icon-btn" (click)="emit('zoom-in')" title="Zoom In">
      <span>+</span>
    </button>
    <button class="ui-icon-btn" (click)="emit('zoom-reset')" title="Reset Zoom">
      <span>⊡</span>
    </button>
  </div>
  <div class="ui-toolbar-group">
    <button
      class="ui-icon-btn"
      [class.ui-icon-btn-active]="showGrid"
      (click)="emit('toggle-grid')"
      title="Toggle Grid"
    >
      <span>▦</span>
    </button>
  </div>
</div>
