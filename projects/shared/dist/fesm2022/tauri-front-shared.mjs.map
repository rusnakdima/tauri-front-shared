<div
  class="ui-split-view"
  #container
  [class.ui-split-view-vertical]="direction === 'vertical'"
>
  <div
    class="ui-split-pane-first"
    [style]="
      direction === 'horizontal'
        ? 'height: 100%; width: ' + split + '%; flex-grow: 0'
        : 'width: 100%; height: ' + split + '%; flex-grow: 0'
    "
  >
    <ng-content select="[slot=first]"></ng-content>
  </div>
  <div
    class="ui-split-divider"
    [class.ui-split-divider-dragging]="isDragging"
    [class.ui-split-divider-horizontal]="direction === 'horizontal'"
    [class.ui-split-divider-vertical]="direction === 'vertical'"
    (mousedown)="onDividerMouseDown($event)"
  ></div>
  <div
    class="ui-split-pane-second"
    [style]="
      direction === 'horizontal'
        ? 'flex: 1; height: 100%'
        : 'flex: 1; width: 100%'
    "
  >
    <ng-content select="[slot=second]"></ng-content>
  </div>
</div>
