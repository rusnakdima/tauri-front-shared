<div
  class="ui-designer-tree-node"
  [style.paddingLeft.px]="depth * 16 + 8"
  [class.ui-designer-tree-node-selected]="node.selected"
  (click)="select.emit(node)"
>
  <span class="ui-designer-tree-node-toggle" (click)="toggle($event)">
    @if (node.children?.length) {
      {{ node.expanded ? "▼" : "▶" }}
    }
  </span>
  <span class="ui-designer-tree-node-icon">{{ node.icon }}</span>
  <span class="ui-designer-tree-node-label">{{ node.label }}</span>
  <span class="ui-designer-tree-node-id">{{ node.id }}</span>
</div>
@if (node.expanded && node.children?.length) {
  @for (child of node.children; track child.id) {
    <app-designer-tree-node
      [node]="child"
      [depth]="depth + 1"
      (select)="select.emit($event)"
    ></app-designer-tree-node>
  }
}
