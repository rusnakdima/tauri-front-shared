<div class="ui-main-editor">
  <div class="ui-main-editor-toolbar">
    <button
      class="ui-icon-btn"
      [disabled]="!designer.canUndo()"
      (click)="designer.undo()"
      title="Undo"
    >
      <app-icon icon="undo" [size]="18" />
    </button>
    <button
      class="ui-icon-btn"
      [disabled]="!designer.canRedo()"
      (click)="designer.redo()"
      title="Redo"
    >
      <app-icon icon="redo" [size]="18" />
    </button>
    <div class="ui-toolbar-divider"></div>
    <button
      class="ui-icon-btn"
      [class.ui-icon-btn-active]="designer.showGrid()"
      (click)="designer.toggleGrid()"
      title="Toggle grid"
    >
      <app-icon icon="grid" [size]="18" />
    </button>
    <div class="ui-toolbar-divider"></div>
    <button
      class="ui-icon-btn"
      (click)="zoomOut()"
      title="Zoom out"
    >
      <app-icon icon="zoom_out" [size]="18" />
    </button>
    <span class="ui-zoom-label">{{ designer.zoom() }}%</span>
    <button
      class="ui-icon-btn"
      (click)="zoomIn()"
      title="Zoom in"
    >
      <app-icon icon="zoom_in" [size]="18" />
    </button>
    <button
      class="ui-icon-btn"
      (click)="designer.setZoom(100)"
      title="Reset zoom"
    >
      <app-icon icon="fit_screen" [size]="18" />
    </button>
    <div class="ui-toolbar-spacer"></div>
    <button
      class="ui-icon-btn"
      [disabled]="!designer.selectedId()"
      (click)="deleteSelected()"
      title="Delete selected"
    >
      <app-icon icon="delete" [size]="18" />
    </button>
  </div>
  <div class="ui-main-editor-canvas" (click)="onCanvasClick($event)">
    <app-canvas></app-canvas>
  </div>
</div>
