<div
  class="ui-empty-state-icon"
  [class.ui-empty-state-danger]="variant === 'danger'"
  [class.ui-empty-state-success]="variant === 'success'"
>
  @if (icon) {
    <span>{{ icon }}</span>
  }
</div>
@if (title) {
  <h3>{{ title }}</h3>
}
@if (message) {
  <p>{{ message }}</p>
}
@if (action) {
  <div>
    <button class="ui-btn ui-btn-primary" (click)="actionClicked.emit($event)">
      {{ action }}
    </button>
  </div>
}
