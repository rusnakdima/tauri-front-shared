@if (tag === 'h1') {
  <h1 [class]="classes">{{ text }}</h1>
} @else if (tag === 'h2') {
  <h2 [class]="classes">{{ text }}</h2>
} @else if (tag === 'p') {
  <p [class]="classes">{{ text }}</p>
} @else if (tag === 'footer') {
  <footer [class]="classes">{{ text }}</footer>
} @else {
  <span [class]="classes">{{ text }}</span>
}
