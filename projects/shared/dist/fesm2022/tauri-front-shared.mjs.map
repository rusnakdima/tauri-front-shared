<div [id]="element.id" [class]="classes" [style]="gridStyle">
  @if (isNativeHtml && props['text']) {
    <ng-container [ngSwitch]="tag">
      <h1 *ngSwitchCase="'h1'">{{ props['text'] }}</h1>
      <h2 *ngSwitchCase="'h2'">{{ props['text'] }}</h2>
      <p *ngSwitchCase="'p'">{{ props['text'] }}</p>
      <footer *ngSwitchCase="'footer'">{{ props['text'] }}</footer>
      <span *ngSwitchDefault>{{ props['text'] }}</span>
    </ng-container>
  } @else if (componentType) {
    <ng-container *ngComponentOutlet="componentType; inputs: props"></ng-container>
  }
  @for (child of childElements; track $index) {
    <app-schema-element [element]="child" [elements]="elements"></app-schema-element>
  }
</div>
