<div
  class="ui-tree-node"
  [style.paddingLeft.px]="depth * 20"
  [class.ui-tree-node-selected]="node.selected"
  (click)="handleClick()"
>
  @if (node.children?.length) {
    <span
      class="ui-tree-node-toggle"
      (click)="toggleExpand($event)"
      >{{ node.expanded ? "▼" : "▶" }}</span
    >
  } @else {
    <span class="ui-tree-node-toggle-placeholder"></span>
  }
  @if (node.icon) {
    <span class="ui-tree-node-icon">{{ node.icon }}</span>
  }
  <span class="ui-tree-node-label">{{ node.label }}</span>
</div>
@if (node.expanded && node.children?.length) {
  @for (child of node.children; track child.id) {
    <app-tree-node
      [node]="child"
      [depth]="depth + 1"
      (selected)="onChildSelected($event)"
    ></app-tree-node>
  }
}
