@if (visibleToasts().length > 0) {
  <div
    class="sf-fixed sf-z-50 sf-flex sf-w-80 sf-max-w-full sf-flex-col sf-gap-2 sf-p-4"
    [ngClass]="positionClass"
  >
    @for (toast of visibleToasts(); track toast.id) {
      <app-toast [toast]="toast" (dismiss)="dismiss($event)"></app-toast>
    }
  </div>
}
