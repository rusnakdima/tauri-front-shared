<div class="ui-bottom-panel">
  <div class="ui-bottom-panel-tabs">
    @for (tab of parsedTabs; track tab.id) {
      <div
        class="ui-bottom-panel-tab"
        [class.ui-bottom-panel-tab-active]="activeTab === tab.id"
        (click)="handleTabClick(tab.id)"
      >
        {{ tab.label }}
      </div>
    }
  </div>
  <div class="ui-bottom-panel-body">
    <ng-content></ng-content>
    @if (!parsedTabs.length) {
      <div>No tabs available</div>
    }
  </div>
</div>
