<form (submit)="handleSubmit($event)">
  @if (heading) {
    <h3>{{ heading }}</h3>
  }
  <ng-content></ng-content>
  @if (showActions) {
    <div class="ui-form-actions">
      <button
        type="submit"
        class="ui-btn ui-btn-primary"
      >
        {{ submitText }}
      </button>
      <button
        type="button"
        class="ui-btn ui-btn-secondary"
        (click)="handleCancel()"
      >
        {{ cancelText }}
      </button>
    </div>
  }
</form>
