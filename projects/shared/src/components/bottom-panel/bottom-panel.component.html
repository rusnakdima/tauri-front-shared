<div
  appApplyTheme="app-bottom-panel"
  class="flex flex-col h-full border-t bg-[var(--bg-elevated)] border-[var(--border-color)]"
>
  <div class="flex gap-0 pb-px border-b border-[var(--border-color)]">
    @for (tab of parsedTabs; track tab.id) {
      <div
        class="px-4 py-3 text-sm font-medium cursor-pointer border-b-2 -mb-px transition-all duration-150"
        [class.text-[var(--accent)]]]="activeTab === tab.id"
        [class.text-[var(--text-secondary)]]]="activeTab !== tab.id"
        [class.border-b-[var(--accent)]]]="activeTab === tab.id"
        [class.border-b-transparent]="activeTab !== tab.id"
        (click)="handleTabClick(tab.id)"
      >
        {{ tab.label }}
      </div>
    }
  </div>
  <div class="flex-1 overflow-auto p-4">
    <ng-content></ng-content>
    @if (!parsedTabs.length) {
      <div class="text-center text-sm text-[var(--text-muted)] py-8">
        No tabs available
      </div>
    }
  </div>
</div>
