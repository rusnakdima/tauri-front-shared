<button
  appApplyTheme="app-button"
  [themedVariant]="buttonStyle"
  [themedSize]="size"
  [attr.type]="type || 'button'"
  [class]="getButtonClass()"
  [disabled]="disabled || loading"
  (click)="handleClick($event)"
  class="inline-flex items-center justify-center gap-2 rounded-lg border px-4 py-2 text-center font-medium transition-all cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed"
>
  @if (loading) {
    <span
      class="app-btn-spinner w-4 h-4 border-2 border-current border-t-transparent rounded-full animate-spin"
    ></span>
  } @else {
    @if (icon && iconPosition === "left") {
      <app-icon class="app-btn-icon" [icon]="icon" [size]="20" />
    }
    @if (label) {
      <span>{{ label }}</span>
    } @else {
      <ng-content></ng-content>
    }
    @if (icon && iconPosition === "right") {
      <app-icon class="app-btn-icon" [icon]="icon" [size]="20" />
    }
  }
</button>
