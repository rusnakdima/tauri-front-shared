<div [class]="getCardClasses()">
  @if (title || subtitle) {
    <div [class]="getContentClasses()">
      @if (title) {
        <h3 class="text-base font-semibold text-on-surface mb-1">
          {{ title }}
        </h3>
      }
      @if (subtitle) {
        <p class="text-xs text-on-surface-variant">
          {{ subtitle }}
        </p>
      }
    </div>
  }
  <ng-content />
</div>
