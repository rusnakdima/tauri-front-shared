@if (isOpen()) {
  <div class="ui-command-palette-overlay" (click)="close()">
    <div class="ui-command-palette" (click)="$event.stopPropagation()">
      <div class="ui-command-palette-search">
        <app-icon icon="search" [size]="20" />
        <input
          type="text"
          [placeholder]="placeholder"
          [value]="searchQuery()"
          (input)="onSearchChange($any($event.target).value)"
          autofocus
        />
        <kbd>Esc</kbd>
      </div>
      <div class="ui-command-palette-results">
        @if (filteredCommands().length === 0) {
          <div class="ui-command-palette-empty">
            <app-icon icon="search" [size]="40" />
            <span>No commands found</span>
          </div>
        } @else {
          @for (group of groupedCommands(); track group.key) {
            <div class="ui-command-palette-group">
              <div class="ui-command-palette-group-label">
                {{ group.key }}
              </div>
              @for (command of group.value; track command.id) {
                <button
                  type="button"
                  class="ui-command-palette-item"
                  [class.ui-command-palette-item-selected]="isSelected(command)"
                  [class.ui-command-palette-item-disabled]="command.disabled"
                  [disabled]="command.disabled"
                  (click)="selectCommand(command)"
                >
                  @if (command.icon) {
                    <app-icon [icon]="command.icon" [size]="20" />
                  }
                  <span>{{ command.label }}</span>
                  @if (command.shortcut) {
                    <kbd>{{ command.shortcut }}</kbd>
                  }
                </button>
              }
            </div>
          }
        }
      </div>
      <div class="ui-command-palette-footer">
        <span><kbd>↑↓</kbd> Navigate</span>
        <span><kbd>↵</kbd> Select</span>
        <span><kbd>Esc</kbd> Close</span>
      </div>
    </div>
  </div>
}
