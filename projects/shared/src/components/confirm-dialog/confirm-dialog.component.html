@if (open) {
  <div class="ui-modal-overlay" (click)="cancel()">
    <div class="ui-confirm-dialog" (click)="$event.stopPropagation()">
      <header class="ui-confirm-dialog-header">
        <h2>{{ title || "Confirm" }}</h2>
        <button
          class="ui-confirm-dialog-close"
          (click)="cancel()"
          aria-label="Close"
        >
          &times;
        </button>
      </header>
      <div class="ui-confirm-dialog-body">{{ message }}</div>
      <footer class="ui-confirm-dialog-footer">
        <button class="ui-btn ui-btn-secondary" (click)="cancel()">
          {{ cancelText || "Cancel" }}
        </button>
        <button class="ui-btn ui-btn-primary" (click)="confirm()">
          {{ confirmText || "Confirm" }}
        </button>
      </footer>
    </div>
  </div>
}
