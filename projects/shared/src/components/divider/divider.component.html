<div
  class="ui-divider"
  [class.ui-divider-vertical]="orientation === 'vertical'"
  role="separator"
>
  <div
    class="ui-divider-line"
    [class.ui-divider-line-vertical]="orientation === 'vertical'"
    [style.background]="color || 'var(--divider-color, var(--border-color))'"
  ></div>
</div>
