<div appApplyTheme="app-input" class="flex flex-col gap-1">
  @if (label) {
    <label class="text-sm font-medium text-[var(--text-primary)]">{{
      label
    }}</label>
  }
  <div class="relative flex items-center" [class.app-input-focused]="focused">
    @if (icon) {
      <app-icon
        class="absolute left-3 text-xl"
        [icon]="icon"
        [size]="20"
        [class]="focused ? 'text-[var(--accent)]' : 'text-[var(--text-muted)]'"
      />
    }
    <input
      #inputEl
      [attr.type]="type"
      class="w-full px-3 py-2 rounded-lg border transition-all outline-none focus:shadow-[0_0_0_1px_var(--accent)] disabled:opacity-50 disabled:cursor-not-allowed"
      [class.ps-10]="!!icon"
      [class.border-[var(--error)]]="error"
      [class.border-[var(--accent)]]="!error && focused"
      [class.border-[var(--border-color)]]="!error && !focused"
      [class.bg-[var(--bg-tertiary)]]="disabled"
      [class.bg-[var(--bg-primary)]]="!disabled"
      [placeholder]="placeholder"
      [disabled]="disabled"
      [value]="value"
      (input)="handleInput($event)"
      (focus)="focused = true"
      (blur)="focused = false"
    />
  </div>
  @if (error) {
    <span class="text-xs text-[var(--error)]">{{ error }}</span>
  }
</div>
