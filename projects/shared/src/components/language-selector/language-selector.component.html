<div class="ui-language-selector">
  @if (label) {
    <label [attr.id]="labelId">{{ label }}</label>
  }
  <select
    [value]="value"
    (change)="handleChange($event)"
    [attr.aria-labelledby]="labelId || null"
  >
    @for (lang of parsedLanguages; track lang.value) {
      <option [value]="lang.value" [selected]="lang.value === value">
        {{ lang.label }}
      </option>
    }
  </select>
  <app-icon class="ui-language-selector-icon" icon="chevron-down" [size]="16" />
</div>
