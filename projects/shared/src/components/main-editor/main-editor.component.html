<div
  appApplyTheme="app-main-editor"
  class="flex flex-col h-full bg-[var(--bg-primary)]"
>
  <div
    class="flex items-center gap-1 py-[6px] px-3 bg-[var(--bg-elevated)] border-b border-[var(--border-color)] min-h-[2.5rem]"
  >
    <button
      class="flex items-center justify-center w-8 h-8 rounded-md border-none bg-transparent text-base transition-all duration-150 hover:disabled:opacity-30 text-[var(--text-secondary)] cursor-pointer"
      [disabled]="!designer.canUndo()"
      (click)="designer.undo()"
      title="Undo"
    >
      <app-icon icon="undo" [size]="18" />
    </button>
    <button
      class="flex items-center justify-center w-8 h-8 rounded-md border-none bg-transparent text-base transition-all duration-150 hover:disabled:opacity-30 text-[var(--text-secondary)] cursor-pointer"
      [disabled]="!designer.canRedo()"
      (click)="designer.redo()"
      title="Redo"
    >
      <app-icon icon="redo" [size]="18" />
    </button>
    <div class="w-px h-5 mx-1 bg-[var(--border-color)]"></div>
    <button
      class="flex items-center justify-center w-8 h-8 rounded-md border-none bg-transparent text-base transition-all duration-150 text-[var(--text-secondary)]"
      [class.text-[var(--accent)]]]="designer.showGrid()"
      [class.text-[var(--text-secondary)]]]="!designer.showGrid()"
      [class.bg-[color-mix(in_srgb,_var(--accent)_15%,_transparent)]]]="
        designer.showGrid()
      "
      [class.bg-transparent]="!designer.showGrid()"
      (click)="designer.toggleGrid()"
      title="Toggle grid"
    >
      <app-icon icon="grid" [size]="18" />
    </button>
    <div class="w-px h-5 mx-1 bg-[var(--border-color)]"></div>
    <button
      class="flex items-center justify-center w-8 h-8 rounded-md border-none bg-transparent text-base transition-all duration-150 text-[var(--text-secondary)]"
      (click)="zoomOut()"
      title="Zoom out"
    >
      <app-icon icon="zoom_out" [size]="18" />
    </button>
    <span class="text-xs min-w-10 text-center text-[var(--text-secondary)]"
      >{{ designer.zoom() }}%</span
    >
    <button
      class="flex items-center justify-center w-8 h-8 rounded-md border-none bg-transparent text-base transition-all duration-150 text-[var(--text-secondary)]"
      (click)="zoomIn()"
      title="Zoom in"
    >
      <app-icon icon="zoom_in" [size]="18" />
    </button>
    <button
      class="flex items-center justify-center w-8 h-8 rounded-md border-none bg-transparent text-base transition-all duration-150 text-[var(--text-secondary)]"
      (click)="designer.setZoom(100)"
      title="Reset zoom"
    >
      <app-icon icon="fit_screen" [size]="18" />
    </button>
    <div class="flex-1"></div>
    <button
      class="flex items-center justify-center w-8 h-8 rounded-md border-none bg-transparent text-base transition-all duration-150 hover:disabled:opacity-30 text-[var(--text-secondary)] cursor-pointer"
      [disabled]="!designer.selectedId()"
      (click)="deleteSelected()"
      title="Delete selected"
    >
      <app-icon icon="delete" [size]="18" />
    </button>
  </div>
  <div class="flex-1 overflow-auto relative" (click)="onCanvasClick($event)">
    <app-canvas></app-canvas>
  </div>
</div>
