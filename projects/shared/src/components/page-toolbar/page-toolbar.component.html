<div class="ui-page-toolbar">
  <div class="ui-page-toolbar-title">
    <h2>{{ title }}</h2>
    <ng-content select="[slot=subtitle]"></ng-content>
  </div>
  <div class="ui-page-toolbar-actions">
    @for (action of parsedActions; track action.label) {
      <button
        class="ui-btn"
        [class.ui-btn-primary]="action.variant === 'primary'"
        [class.ui-btn-danger]="action.variant === 'danger'"
        [class.ui-btn-ghost]="action.variant === 'ghost'"
        (click)="handleAction(action)"
      >
        @if (action.icon) {
          <app-icon [icon]="action.icon" [size]="18" />
        }
        {{ action.label }}
      </button>
    }
  </div>
</div>
