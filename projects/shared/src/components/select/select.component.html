<select
  appApplyTheme="app-select"
  class="inline-flex items-center px-4 py-2 rounded-lg border text-base font-medium cursor-pointer transition-all min-w-36 hover:bg-[var(--bg-hover)] disabled:opacity-50 disabled:cursor-not-allowed border-[var(--border-color)] bg-[var(--bg-elevated)] text-[var(--text-primary)]"
  [style.--tw-border-color]="'var(--border-color)'"
  [disabled]="disabled"
  (change)="handleChange($event)"
>
  <option value="" disabled selected hidden>{{ placeholder }}</option>
  @for (opt of parsedOptions; track opt) {
    <option [value]="opt" [selected]="opt === value">{{ opt }}</option>
  }
</select>
