@if (visible) {
  <div class="ui-modal-overlay" (click)="close()">
    <div class="ui-shortcuts-overlay" (click)="$event.stopPropagation()">
      <div class="ui-shortcuts-header">
        <h3>{{ title || "Keyboard Shortcuts" }}</h3>
        <button (click)="close()" aria-label="Close">&times;</button>
      </div>
      <div class="ui-shortcuts-body">
        @for (shortcut of parsedShortcuts; track shortcut.key) {
          <div class="ui-shortcuts-item">
            <kbd>{{ shortcut.key }}</kbd>
            <span>{{ shortcut.description }}</span>
          </div>
        }
      </div>
    </div>
  </div>
}
