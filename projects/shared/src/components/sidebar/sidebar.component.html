<aside
  class="ui-sidebar"
  [class.ui-sidebar-collapsed]="collapsed"
  [style.width.px]="width"
  [style.min-width.px]="width"
>
  <div class="ui-sidebar-header">
    <button
      class="ui-sidebar-toggle"
      (click)="toggleCollapse()"
      aria-label="Toggle sidebar"
    >
      {{ collapsed ? "→" : "←" }}
    </button>
  </div>
  <nav class="ui-sidebar-nav">
    <ul>
      @for (item of parsedItems; track item.label) {
        <li>
          <div class="ui-sidebar-item" (click)="handleItemClick(item)">
            @if (item.icon) {
              <span class="ui-sidebar-item-icon">{{ item.icon }}</span>
            }
            <span class="ui-sidebar-item-label">{{ item.label }}</span>
          </div>
          @if (item.children?.length) {
            <ul class="ui-sidebar-submenu">
              @for (child of item.children; track child.label) {
                <li>
                  <div class="ui-sidebar-item" (click)="handleItemClick(child)">
                    @if (child.icon) {
                      <span class="ui-sidebar-item-icon">{{ child.icon }}</span>
                    }
                    <span class="ui-sidebar-item-label">{{ child.label }}</span>
                  </div>
                </li>
              }
            </ul>
          }
        </li>
      }
    </ul>
  </nav>
  <ng-content></ng-content>
</aside>
