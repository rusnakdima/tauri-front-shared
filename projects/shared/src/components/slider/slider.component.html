<div appApplyTheme="app-slider" class="w-full">
  <input
    type="range"
    class="w-full cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed"
    [style.accentColor]="'var(--accent)'"
    [value]="value"
    [min]="min"
    [max]="max"
    [step]="step"
    [disabled]="disabled"
    (input)="handleInput($event)"
  />
</div>
