@if (open) {
  <div
    appApplyTheme="app-snackbar"
    [class]="'bar ' + type"
    class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[9999] block inline-flex items-center gap-3 p-3 rounded-lg bg-[var(--bg-elevated)] text-[var(--text-on-accent)] text-sm shadow-xl min-w-[280px] max-w-[560px] border-l-4"
    [style.border-left-color]="'var(--' + type + '-color, var(--accent))'"
    role="status"
  >
    <span class="message flex-1">{{ message }}</span>
    @if (action) {
      <button
        class="action-btn bg-transparent border-none text-[var(--accent)] font-semibold cursor-pointer px-2 py-1 rounded text-xs uppercase hover:bg-white/10"
        (click)="handleAction()"
      >
        {{ action }}
      </button>
    }
    <button
      class="close-btn bg-transparent border-none cursor-pointer p-0.5 opacity-70 text-lg leading-none hover:opacity-100"
      (click)="dismiss()"
      aria-label="Dismiss"
    >
      &times;
    </button>
  </div>
}
