<div class="ui-spinner">
  <div
    class="ui-spinner-icon"
    [class.ui-spinner-sm]="size === 'sm'"
    [class.ui-spinner-md]="size === 'md'"
    [class.ui-spinner-lg]="size === 'lg'"
    [style.borderTopColor]="color || 'var(--accent)'"
  ></div>
  @if (label) {
    <span>{{ label }}</span>
  }
</div>
