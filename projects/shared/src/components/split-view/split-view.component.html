<div
  appApplyTheme="app-split-view"
  #container
  [class]="
    'flex h-full w-full overflow-hidden ' +
    (direction === 'vertical' ? 'flex-col' : '')
  "
>
  <div
    class="split-pane first overflow-auto shrink-0"
    [style]="
      direction === 'horizontal'
        ? 'height: 100%; width: ' + split + '%; flex-grow: 0'
        : 'width: 100%; height: ' + split + '%; flex-grow: 0'
    "
  >
    <ng-content select="[slot=first]"></ng-content>
  </div>
  <div
    class="split-divider shrink-0 relative z-10 transition-colors duration-150 bg-[color:var(--border-color)]"
    [class.dragging]="isDragging"
    [class.cursor-col-resize]="direction === 'horizontal'"
    [class.cursor-row-resize]="direction === 'vertical'"
    [class.w-1.5]="direction === 'horizontal'"
    [class.h-full]="direction === 'horizontal'"
    [class.w-full]="direction === 'vertical'"
    [class.h-1.5]="direction === 'vertical'"
    (mousedown)="onDividerMouseDown($event)"
  ></div>
  <div
    class="split-pane second overflow-auto"
    [style]="
      direction === 'horizontal'
        ? 'flex: 1; height: 100%'
        : 'flex: 1; width: 100%'
    "
  >
    <ng-content select="[slot=second]"></ng-content>
  </div>
</div>
