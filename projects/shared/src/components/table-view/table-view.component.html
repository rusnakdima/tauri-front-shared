<table appApplyTheme="app-table-view" class="w-full border-collapse text-sm">
  <thead>
    <tr>
      @for (col of parsedColumns; track col.key) {
        <th
          class="text-left p-3 bg-[color:var(--bg-secondary)] text-[color:var(--text-primary)] font-semibold border-b border-[color:var(--border-color)]"
        >
          {{ col.name }}
        </th>
      }
    </tr>
  </thead>
  <tbody>
    @for (row of parsedData; track row) {
      <tr class="hover:bg-[color:var(--bg-hover)]">
        @for (col of parsedColumns; track col.key) {
          <td
            class="p-3 text-[color:var(--text-primary)] border-b border-[color:var(--border-color)]"
          >
            {{ row[col.key] }}
          </td>
        }
      </tr>
    }
  </tbody>
</table>
