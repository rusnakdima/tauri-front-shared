<div class="ui-text-input">
  <textarea
    #textareaEl
    class="ui-textarea"
    [placeholder]="placeholder"
    [value]="value"
    [attr.maxlength]="maxChars || null"
    (input)="handleInput($event)"
    (focus)="focused = true"
    (blur)="focused = false"
  ></textarea>
  @if (clearable && value) {
    <button class="ui-text-input-clear" (click)="clear()" aria-label="Clear">
      &times;
    </button>
  }
  @if (maxChars) {
    <span class="ui-text-input-counter">{{ value.length }}/{{ maxChars }}</span>
  }
</div>
