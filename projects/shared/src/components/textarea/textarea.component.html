@if (label) {
  <label class="block text-sm font-medium mb-1 text-[var(--text-primary)]">{{
    label
  }}</label>
}
<textarea
  appApplyTheme="app-textarea"
  class="w-full px-3 py-2 rounded-lg border outline-none resize-y min-h-20 font-inherit focus:border-[var(--accent)] disabled:opacity-50 disabled:cursor-not-allowed border-[var(--border-color)] bg-[var(--bg-primary)] text-[var(--text-primary)]"
  [style.flexGrow]="flexGrow ? 1 : null"
  [placeholder]="placeholder"
  [disabled]="disabled"
  (input)="handleInput($event)"
></textarea>
