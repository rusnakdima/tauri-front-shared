<div class="ui-translation-output">
  <textarea
    #outputEl
    class="ui-textarea"
    [value]="value"
    [placeholder]="placeholder || 'Translation will appear here...'"
    readonly
  ></textarea>
  @if (showCopyButton && value) {
    <button
      class="ui-translation-output-copy"
      (click)="copyToClipboard()"
      aria-label="Copy"
    >
      @if (isCopied) {
        <span>Copied!</span>
      } @else {
        <app-icon icon="copy" [size]="14" />
      }
    </button>
  }
</div>
