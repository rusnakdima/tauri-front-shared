<div appApplyTheme="app-translation-output" class="relative">
  <textarea
    #outputEl
    class="w-full p-3 rounded-lg border box-border resize-none min-h-20 cursor-default font-inherit text-base bg-[var(--bg-primary)] text-[var(--text-primary)]"
    [value]="value"
    [placeholder]="placeholder || 'Translation will appear here...'"
    readonly
  ></textarea>
  @if (showCopyButton && value) {
    <button
      class="absolute right-2 top-2 flex items-center gap-1 p-1.5 rounded-md border cursor-pointer transition-all text-xs border-[var(--border-color)]"
      [style.background-color]="
        hovered ? 'var(--bg-hover)' : 'var(--bg-elevated)'
      "
      [style.color]="hovered ? 'var(--text-primary)' : 'var(--text-secondary)'"
      (mouseenter)="hovered = true"
      (mouseleave)="hovered = false"
      (click)="copyToClipboard()"
      aria-label="Copy"
    >
      @if (isCopied) {
        <span class="text-[var(--success)]">Copied!</span>
      } @else {
        <app-icon icon="copy" [size]="14" />
      }
    </button>
  }
</div>
