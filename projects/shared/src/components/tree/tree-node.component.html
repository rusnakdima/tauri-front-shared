<div
  class="flex items-center gap-[0.375rem] px-2 py-1 cursor-pointer rounded transition-colors duration-150 tree-node"
  [style.paddingLeft.px]="depth * 20"
  [class.selected]="node.selected"
  [class]="
    node.selected
      ? 'bg-[var(--accent)] text-[var(--text-on-accent)]'
      : 'bg-[var(--bg-hover)]'
  "
  (click)="handleClick()"
>
  @if (node.children?.length) {
    <span
      class="toggle text-[0.625rem] w-4 text-center shrink-0 cursor-pointer text-[var(--text-secondary)]"
      (click)="toggleExpand($event)"
      >{{ node.expanded ? "▼" : "▶" }}</span
    >
  } @else {
    <span class="toggle-placeholder w-4 shrink-0"></span>
  }
  @if (node.icon) {
    <span class="node-icon text-base shrink-0 text-[var(--text-secondary)]">{{
      node.icon
    }}</span>
  }
  <span
    class="node-label flex-1 overflow-hidden text-ellipsis whitespace-nowrap"
    >{{ node.label }}</span
  >
</div>
@if (node.expanded && node.children?.length) {
  @for (child of node.children; track child.id) {
    <app-tree-node
      [node]="child"
      [depth]="depth + 1"
      (selected)="onChildSelected($event)"
    ></app-tree-node>
  }
}
