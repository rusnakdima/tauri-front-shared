<app-modal
  [open]="isOpen"
  [title]="options.title || 'Confirm'"
  size="sm"
  [showFooter]="true"
  [showHeader]="true"
  [showCloseButton]="false"
  (closed)="onCancel()"
>
  <div style="color: var(--text-main)">
    <p>{{ options.message }}</p>
    @if (options.itemName) {
      <p
        class="sf-font-mono"
        style="background: var(--bg-elevated); color: var(--accent)"
      >
        {{ options.itemName }}
      </p>
    }
  </div>

  <div modal-footer class="sf-flex sf-justify-end sf-gap-3">
    <button type="button" (click)="onCancel()" class="ui-btn ui-btn-outline">
      {{ options.cancelText || "Cancel" }}
    </button>
    <button
      type="button"
      (click)="onConfirm()"
      [class]="options.confirmClass || 'ui-btn ui-btn-primary'"
    >
      {{ options.confirmText || "Confirm" }}
    </button>
  </div>
</app-modal>
