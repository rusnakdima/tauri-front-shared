@if (isVisible()) {
  <div
    class="modal-backdrop fixed inset-0 z-50 flex justify-center bg-[var(--bg-backdrop)] backdrop-blur-sm transition-opacity duration-200"
    [class.opacity-0]="isAnimating()"
    [class.opacity-100]="!isAnimating()"
    [class]="contentPositionClasses"
    (click)="onBackdropClick($event)"
  >
    <div
      role="dialog"
      aria-modal="true"
      [attr.aria-labelledby]="'modal-title-' + title()"
      class="relative w-full rounded-2xl border border-[var(--border-visible)] bg-[var(--bg-modal)] shadow-2xl backdrop-blur-md transition-all duration-200"
      [class.scale-95]="isAnimating()"
      [class.scale-100]="!isAnimating()"
      [class]="sizeClasses"
    >
      @if (showHeader()) {
        <div
          class="flex items-center justify-between border-b border-[var(--border-subtle)] px-6 py-4"
        >
          <h2 [id]="'modal-title-' + title()" class="text-lg font-semibold text-[var(--text-main)]">
            {{ title() }}
          </h2>
          @if (showCloseButton()) {
            <button
              type="button"
              (click)="onClose()"
              class="rounded-lg p-1.5 text-[var(--text-dim)] transition-colors hover:bg-[var(--accent)]/10 hover:text-[var(--text-main)]"
              aria-label="Close modal"
            >
              <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path
                  fill-rule="evenodd"
                  d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
                  clip-rule="evenodd"
                />
              </svg>
            </button>
          }
        </div>
      }

      <div class="max-h-[calc(100vh-12rem)] overflow-y-auto px-6 py-4">
        <ng-content></ng-content>
      </div>

      @if (showFooter()) {
        <div
          class="flex items-center justify-end gap-3 border-t border-[var(--border-subtle)] px-6 py-4"
        >
          <ng-content select="[modal-footer]"></ng-content>
        </div>
      }
    </div>
  </div>
}
