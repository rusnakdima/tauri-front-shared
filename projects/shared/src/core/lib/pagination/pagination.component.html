<div
  class="flex w-full items-center justify-between border-t border-[var(--border-subtle)] bg-transparent px-6 py-3"
>
  <div class="flex items-center gap-6">
    <span class="text-sm text-[var(--text-dim)]">
      Showing
      <span class="font-bold text-[var(--text-main)]">{{ startIndex }}</span
      >-<span class="font-bold text-[var(--text-main)]">{{ endIndex }}</span> of
      <span class="font-bold text-[var(--text-main)]">{{ totalItems }}</span>
    </span>
    <div class="flex items-center gap-3">
      <span class="text-xs text-[var(--text-muted)]">Rows per page:</span>
      <select
        class="cursor-pointer rounded-lg border border-[var(--border-visible)] bg-[var(--bg-card)] px-3 py-1.5 text-sm text-[var(--text-main)] focus:border-[var(--accent)] focus:outline-none"
        [value]="pageSize"
        (change)="onPageSizeChange(+$any($event.target).value)"
      >
        <option value="10">10</option>
        <option value="25">25</option>
        <option value="50">50</option>
        <option value="100">100</option>
      </select>
    </div>
  </div>

  <div class="flex items-center gap-2">
    <button
      class="rounded-lg p-2 text-[var(--text-dim)] transition-all hover:bg-[var(--bg-card)] hover:text-[var(--text-main)] disabled:cursor-not-allowed disabled:opacity-30"
      [disabled]="!hasPrevPage"
      (click)="firstPage()"
      title="First page"
    >
      <i class="fa fa-angles-left" style="font-size: 14px"></i>
    </button>
    <button
      class="rounded-lg p-2 text-[var(--text-dim)] transition-all hover:bg-[var(--bg-card)] hover:text-[var(--text-main)] disabled:cursor-not-allowed disabled:opacity-30"
      [disabled]="!hasPrevPage"
      (click)="prevPage()"
      title="Previous page"
    >
      <i class="fa fa-chevron-left" style="font-size: 14px"></i>
    </button>
    <span class="px-3 text-sm text-[var(--text-dim)]"
      >Page {{ currentPage + 1 }} of {{ totalPages || 1 }}</span
    >
    <button
      class="rounded-lg p-2 text-[var(--text-dim)] transition-all hover:bg-[var(--bg-card)] hover:text-[var(--text-main)] disabled:cursor-not-allowed disabled:opacity-30"
      [disabled]="!hasNextPage"
      (click)="nextPage()"
      title="Next page"
    >
      <i class="fa fa-chevron-right" style="font-size: 14px"></i>
    </button>
    <button
      class="rounded-lg p-2 text-[var(--text-dim)] transition-all hover:bg-[var(--bg-card)] hover:text-[var(--text-main)] disabled:cursor-not-allowed disabled:opacity-30"
      [disabled]="!hasNextPage"
      (click)="lastPage()"
      title="Last page"
    >
      <i class="fa fa-angles-right" style="font-size: 14px"></i>
    </button>
  </div>
</div>
