<div
  class="sf-flex sf-w-full sf-items-center sf-justify-between sf-border-t sf-bg-transparent"
  style="border-color: var(--border-subtle)"
>
  <div class="sf-flex sf-items-center sf-gap-6">
    <span style="color: var(--text-dim)">
      Showing
      <span style="color: var(--text-main)">{{ startIndex }}</span
      >-<span style="color: var(--text-main)">{{ endIndex }}</span> of
      <span style="color: var(--text-main)">{{ totalItems }}</span>
    </span>
    <div class="sf-flex sf-items-center sf-gap-3">
      <span style="color: var(--text-muted)">Rows per page:</span>
      <select
        class="sf-cursor-pointer sf-border sf-bg-transparent sf-text-sm sf-focus-outline-none"
        style="
          border-color: var(--border-visible);
          color: var(--text-main);
          background: var(--bg-card);
        "
        [value]="pageSize"
        (change)="onPageSizeChange(+$any($event.target).value)"
      >
        <option value="10">10</option>
        <option value="25">25</option>
        <option value="50">50</option>
        <option value="100">100</option>
      </select>
    </div>
  </div>

  <div class="sf-flex sf-items-center sf-gap-2">
    <button
      class="sf-transition-all sf-disabled-cursor-not-allowed sf-disabled-opacity-30 sf-hover-bg-card sf-hover-text-main"
      style="color: var(--text-dim)"
      [disabled]="!hasPrevPage"
      (click)="firstPage()"
      title="First page"
    >
      <i class="fa fa-angles-left" style="font-size: 14px"></i>
    </button>
    <button
      class="sf-transition-all sf-disabled-cursor-not-allowed sf-disabled-opacity-30 sf-hover-bg-card sf-hover-text-main"
      style="color: var(--text-dim)"
      [disabled]="!hasPrevPage"
      (click)="prevPage()"
      title="Previous page"
    >
      <i class="fa fa-chevron-left" style="font-size: 14px"></i>
    </button>
    <span class="sf-text-sm" style="color: var(--text-dim)"
      >Page {{ currentPage + 1 }} of {{ totalPages || 1 }}</span
    >
    <button
      class="sf-transition-all sf-disabled-cursor-not-allowed sf-disabled-opacity-30 sf-hover-bg-card sf-hover-text-main"
      style="color: var(--text-dim)"
      [disabled]="!hasNextPage"
      (click)="nextPage()"
      title="Next page"
    >
      <i class="fa fa-chevron-right" style="font-size: 14px"></i>
    </button>
    <button
      class="sf-transition-all sf-disabled-cursor-not-allowed sf-disabled-opacity-30 sf-hover-bg-card sf-hover-text-main"
      style="color: var(--text-dim)"
      [disabled]="!hasNextPage"
      (click)="lastPage()"
      title="Last page"
    >
      <i class="fa fa-angles-right" style="font-size: 14px"></i>
    </button>
  </div>
</div>
