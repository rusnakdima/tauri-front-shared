<div
  class="sf-relative sf-flex sf-items-start sf-gap-3 sf-border-l-4 sf-shadow-lg"
  style="background: var(--bg-toast); color: var(--text-main)"
  [style.border-left-color]="
    toast().type === 'success'
      ? 'var(--success)'
      : toast().type === 'error'
        ? 'var(--error)'
        : toast().type === 'warning'
          ? 'var(--warning)'
          : toast().type === 'info'
            ? 'var(--info)'
            : 'var(--border)'
  "
  role="alert"
>
  <div class="sf-mt-0.5 sf-flex-shrink-0">
    @switch (toast().type) {
      @case ("success") {
        <svg
          class="sf-h-5 sf-w-5"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          style="color: var(--success)"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M5 13l4 4L19 7"
          />
        </svg>
      }
      @case ("error") {
        <svg
          class="sf-h-5 sf-w-5"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          style="color: var(--error)"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      }
      @case ("warning") {
        <svg
          class="sf-h-5 sf-w-5"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          style="color: var(--warning)"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
          />
        </svg>
      }
      @case ("info") {
        <svg
          class="sf-h-5 sf-w-5"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          style="color: var(--info)"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
          />
        </svg>
      }
    }
  </div>

  <div class="sf-min-w-0 sf-flex-1">
    @if (toast().title) {
      <p class="sf-font-semibold">{{ toast().title }}</p>
    }
    <p [class.sf-font-medium]="!toast().title">
      {{ toast().message }}
    </p>
    @if (toast().action) {
      <button
        class="sf-mt-2 sf-transition-colors"
        style="color: var(--success)"
      >
        {{ toast().action!.label }}
      </button>
    }
  </div>

  <button
    class="sf-flex-shrink-0 sf-transition-colors sf-hover-text-main"
    style="color: var(--text-dim)"
    (click)="onDismiss()"
    aria-label="Dismiss"
  >
    <svg
      class="sf-h-4 sf-w-4"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M6 18L18 6M6 6l12 12"
      />
    </svg>
  </button>

  @if (!toast().persistent && (toast().duration ?? 0) > 0) {
    <div
      class="sf-absolute sf-right-0 sf-bottom-0 sf-left-0 sf-h-1 sf-overflow-hidden"
      style="background: var(--bg-elevated)"
    >
      <div
        class="sf-h-full sf-w-full"
        [style.background]="
          toast().type === 'success'
            ? 'var(--success)'
            : toast().type === 'error'
              ? 'var(--error)'
              : toast().type === 'warning'
                ? 'var(--warning)'
                : toast().type === 'info'
                  ? 'var(--info)'
                  : 'var(--primary)'
        "
      ></div>
    </div>
  }
</div>
