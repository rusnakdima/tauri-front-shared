<div
  class="relative flex items-start gap-3 rounded-lg border-l-4 bg-[var(--bg-toast)] p-4 text-[var(--text-main)] shadow-lg"
  [class.border-[var(--color-success)]]="toast().type === 'success'"
  [class.border-[var(--color-error)]]="toast().type === 'error'"
  [class.border-[var(--color-warning)]]="toast().type === 'warning'"
  [class.border-[var(--color-info)]]="toast().type === 'info'"
  role="alert"
>
  <div class="mt-0.5 flex-shrink-0">
    @switch (toast().type) {
      @case ("success") {
        <svg
          class="h-5 w-5 text-[var(--color-success)]"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M5 13l4 4L19 7"
          />
        </svg>
      }
      @case ("error") {
        <svg
          class="h-5 w-5 text-[var(--color-error)]"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      }
      @case ("warning") {
        <svg
          class="h-5 w-5 text-[var(--color-warning)]"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
          />
        </svg>
      }
      @case ("info") {
        <svg
          class="h-5 w-5 text-[var(--color-info)]"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
          />
        </svg>
      }
    }
  </div>

  <div class="min-w-0 flex-1">
    @if (toast().title) {
      <p class="text-sm font-semibold">{{ toast().title }}</p>
    }
    <p class="text-sm" [class.font-medium]="!toast().title">{{ toast().message }}</p>
    @if (toast().action) {
      <button
        class="mt-2 text-sm font-medium text-[var(--color-success)] transition-colors hover:text-[var(--color-success)]"
        (click)="onAction()"
      >
        {{ toast().action!.label }}
      </button>
    }
  </div>

  <button
    class="flex-shrink-0 text-[var(--text-dim)] transition-colors hover:text-[var(--text-main)]"
    (click)="onDismiss()"
    aria-label="Dismiss"
  >
    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M6 18L18 6M6 6l12 12"
      />
    </svg>
  </button>

  @if (!toast().persistent && (toast().duration ?? 0) > 0) {
    <div
      class="absolute right-0 bottom-0 left-0 h-1 overflow-hidden rounded-b-lg bg-[var(--bg-elevated)]"
    >
      <div
        class="h-full"
        [class.bg-[var(--color-success)]]="toast().type === 'success'"
        [class.bg-[var(--color-error)]]="toast().type === 'error'"
        [class.bg-[var(--color-warning)]]="toast().type === 'warning'"
        [class.bg-[var(--color-info)]]="toast().type === 'info'"
        class="w-full"
      ></div>
    </div>
  }
</div>
