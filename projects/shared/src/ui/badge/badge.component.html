<span
  class="app-badge"
  [class.app-badge-sm]="size === 'sm'"
  [class.app-badge-md]="size === 'md'"
  [class.app-badge-lg]="size === 'lg'"
  [class.app-badge-default]="variant === 'default'"
  [class.app-badge-primary]="variant === 'primary'"
  [class.app-badge-secondary]="variant === 'secondary'"
  [class.app-badge-success]="variant === 'success'"
  [class.app-badge-warning]="variant === 'warning'"
  [class.app-badge-error]="variant === 'error'"
>
  @if (icon) {
    <i class="material-icons app-badge-icon">{{ icon }}</i>
  }
  <span class="app-badge-label">{{ label }}</span>
  @if (removable) {
    <button class="app-badge-remove" (click)="onRemove($event)">
      <i class="material-icons">close</i>
    </button>
  }
</span>
