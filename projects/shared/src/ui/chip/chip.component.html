<span class="app-chip" [class.app-chip-selected]="selected" (click)="onClick()">
  @if (icon) {
    <i class="material-icons app-chip-icon">{{ icon }}</i>
  }
  <span class="app-chip-label">{{ label }}</span>
  @if (removable) {
    <button class="app-chip-remove" (click)="onRemove($event)">
      <i class="material-icons">close</i>
    </button>
  }
</span>
