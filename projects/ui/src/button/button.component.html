<button
  [type]="type"
  [class]="buttonClass"
  [disabled]="disabled || loading"
  (click)="onClick($event)"
>
  @if (showSpinner) {
    <span class="app-btn-spinner"></span>
  } @else {
    @if (icon && iconPosition === "left") {
      <i class="material-icons app-btn-icon">{{ icon }}</i>
    }
    <ng-content></ng-content>
    @if (icon && iconPosition === "right") {
      <i class="material-icons app-btn-icon">{{ icon }}</i>
    }
  }
</button>
